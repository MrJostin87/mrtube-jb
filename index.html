<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MrTube - Chicken Gun Niveles Beta</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Arial Black', sans-serif;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        /* Escenario automático */
        #stage {
            position: absolute;
            width: 500vw;
            height: 100vh;
            left: 0;
            background-image: url('Fondo.PNG');
            background-size: repeat-x;
            background-position: center;
            will-change: transform;
        }
        /* Panel Superior de la Interfaz (UI) */
        #ui-header {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }
        .ui-box {
            background: rgba(0, 0, 0, 0.65);
            padding: 8px 16px;
            border-radius: 20px;
            border: 3px solid #ffcc00;
            color: #fff;
            font-size: 20px;
            text-shadow: 2px 2px #000;
            display: flex;
            align-items: center;
        }
        #ui-score img {
            width: 30px;
            height: 30px;
            margin-right: 8px;
            animation: spin 4s linear infinite;
        }
        /* Letrero de Recompensa/Nivel en grande */
        #announcement {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            color: #fff;
            font-size: 40px;
            text-align: center;
            text-shadow: 4px 4px #000;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px 40px;
            border-radius: 15px;
            border: 5px solid #00ff00;
            z-index: 15;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        /* Objetivos (NPC) */
        .target {
            position: absolute;
            width: 110px;
            height: auto;
            transform: translate(-50%, -50%);
            z-index: 3;
            pointer-events: none;
        }
        /* Mira Bloqueada */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 60px;
            background-image: url('Mira.PNG');
            background-size: contain;
            background-repeat: no-repeat;
            transform: translate(-50%, -50%);
            pointer-events: none !important;
            z-index: 8;
        }
        /* Botón de la Pistola (Manos) */
        #weapon-container {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            height: auto;
            pointer-events: auto;
            cursor: pointer;
            z-index: 9;
            transition: transform 0.05s ease;
        }
        #weapon {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Fondo móvil -->
        <div id="stage"></div>

        <!-- Interfaz de Usuario -->
        <div id="ui-header">
            <div class="ui-box" id="ui-score">
                <img src="Moneda.PNG" alt="Moneda">
                <span id="score-text">0</span>
            </div>
            <div class="ui-box" id="ui-level">
                Nivel: <span id="level-text">1</span>
            </div>
            <div class="ui-box" id="ui-kills">
                Objetivos: <span id="kills-text">0/10</span>
            </div>
        </div>

        <!-- Cartel de Premios -->
        <div id="announcement"></div>

        <!-- Mira fija -->
        <div id="crosshair"></div>

        <!-- Disparador -->
        <div id="weapon-container">
            <img id="weapon" src="Manos.PNG" alt="Arma">
        </div>
    </div>

    <script>
        const stage = document.getElementById('stage');
        const scoreText = document.getElementById('score-text');
        const levelText = document.getElementById('level-text');
        const killsText = document.getElementById('kills-text');
        const announcement = document.getElementById('announcement');
        const weaponContainer = document.getElementById('weapon-container');
        
        let score = 0;
        let kills = 0;
        let currentLevel = 1;
        let stageX = 0;
        
        const scrollSpeed = 2; 
        const maxNPCs = 10;

        // --- MOVIMIENTO DE CÁMARA AUTOMÁTICO ---
        function updateCamera() {
            stageX -= scrollSpeed;
            
            if (stageX <= -window.innerWidth * 3) {
                stageX = 0;
                const targets = document.querySelectorAll('.target');
                targets.forEach(npc => {
                    let currentLeft = parseFloat(npc.style.left);
                    npc.style.left = (currentLeft - window.innerWidth * 3) + 'px';
                });
            }
            
            stage.style.transform = `translateX(${stageX}px)`;
            requestAnimationFrame(updateCamera);
        }
        requestAnimationFrame(updateCamera);


        // --- SISTEMA DE DISPARO MANUAL ---
        function fireWeapon() {
            weaponContainer.style.transform = 'translateX(-50%) translateY(20px) scale(0.95)';
            setTimeout(() => {
                weaponContainer.style.transform = 'translateX(-50%) translateY(0) scale(1)';
            }, 100);

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            const targets = document.querySelectorAll('.target');
            targets.forEach((npc) => {
                if (npc.dataset.dead === "true") return;

                const rect = npc.getBoundingClientRect();
                
                if (centerX >= rect.left && centerX <= rect.right &&
                    centerY >= rect.top && centerY <= rect.bottom) {
                    
                    eliminateNPC(npc);
                }
            });
        }

        weaponContainer.addEventListener('mousedown', (e) => { e.stopPropagation(); fireWeapon(); });
        weaponContainer.addEventListener('touchstart', (e) => { e.stopPropagation(); e.preventDefault(); fireWeapon(); });


        // --- MOTOR DE ENEMIGOS E INFRAESTRUCTURA ---
        function spawnNPC(isInitial = false) {
            const npc = document.createElement('img');
            npc.src = 'NPC.PNG';
            npc.className = 'target';

            const screenOffset = -stageX;
            
            let spawnX;
            if (isInitial) {
                spawnX = screenOffset + (Math.random() * (window.innerWidth * 2));
            } else {
                // Aparece de inmediato saliendo justo por el borde derecho de la pantalla
                spawnX = screenOffset + window.innerWidth + 50;
            }
            
            const spawnY = Math.random() * (window.innerHeight - 300) + 150;

            npc.style.left = spawnX + 'px';
            npc.style.top = spawnY + 'px';

            stage.appendChild(npc);

            npc.checkBounds = setInterval(() => {
                const rect = npc.getBoundingClientRect();
                if (rect.right < 0) {
                    clearInterval(npc.checkBounds);
                    npc.remove();
                    spawnNPC(false); // Si se escapa, reaparece otro inmediatamente atrás
                }
            }, 1000);
        }

        function eliminateNPC(npc) {
            npc.dataset.dead = "true";
            clearInterval(npc.checkBounds);

            npc.src = 'Disparado.PNG';
            
            // Sumar monedas base (+5)
            score += 5;
            scoreText.textContent = score;

            // Avanzar contador de misiones
            if (currentLevel === 1) {
                kills++;
                killsText.textContent = `${kills}/10`;
                
                // VERIFICACIÓN DEL NIVEL 1 COMPLETADO
                if (kills === 10) {
                    triggerLevelReward();
                }
            } else {
                // En el nivel 2 el contador se vuelve infinito
                kills++;
                killsText.textContent = `${kills}`;
            }

            // Desaparece rápido y mete el reemplazo al instante
            setTimeout(() => {
                npc.remove();
                spawnNPC(false); 
            }, 250);
        }

        // --- GRAN RECOMPENSA DE NIVEL ---
        function triggerLevelReward() {
            currentLevel = 2;
            
            // Otorgar bono de monedas brutal
            score += 100; 
            
            // Actualizar textos en la pantalla
            scoreText.textContent = score;
            levelText.textContent = currentLevel;
            killsText.textContent = `${kills}`; // Deja de pedir límite
            
            // Mostrar letrero de victoria en pantalla
            announcement.innerHTML = "¡NIVEL 1 COMPLETADO!<br><span style='color: #ffcc00;'>🎁 RECOMPENSA: +100 MONEDAS</span>";
            announcement.style.transform = "translate(-50%, -50%) scale(1)";
            
            // Quitar el letrero después de 3 segundos
            setTimeout(() => {
                announcement.style.transform = "translate(-50%, -50%) scale(0)";
            }, 3000);
        }

        // Crear los 10 NPCs iniciales para comenzar el combate
        for(let i = 0; i < maxNPCs; i++) {
            spawnNPC(true);
        }

        document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
    </script>
</body>
</html>
