<!DOCTYPE html>
<html>
<head>
    <title>Chicken Strike NPC</title>
    </head>
<body>

    <div id="pantalla-bienvenida">
        <h1>CHICKEN STRIKE NPC</h1>
        <p>¡Bienvenido! Ten en cuenta que esta es una versión Beta...</p>
        <input type="text" id="nombre-usuario" placeholder="Ingresa tu nombre de piloto">
        <button onclick="iniciarConGoogle()">CEG (Correo Electrónico de Google)</button>
        <button onclick="generarNombreRandom()">Usar Nombre Random</button>
        <label>
            <input type="checkbox" id="check-listo"> Estoy muy Listo
        </label>
        <button id="btn-empezar" disabled onclick="irAlMenu()">EMPEZAR AHORA</button>
    </div>

    <div id="menu-principal" style="display:none;">
        <h1>CHICKEN STRIKE NPC</h1>
        <button>Jugar</button>
        <button>Salir del Juego</button>
    </div>

    <script>
        const checkbox = document.getElementById('check-listo');
        const botonEmpezar = document.getElementById('btn-empezar');
        const musicaMenu = new Audio('Music.mp3');

        checkbox.addEventListener('change', () => {
            botonEmpezar.disabled = !checkbox.checked;
        });

        function irAlMenu() {
            document.getElementById('pantalla-bienvenida').style.display = 'none';
            document.getElementById('menu-principal').style.display = 'block';
            musicaMenu.play().catch(e => console.log("Audio bloqueado"));
        }

        function iniciarConGoogle() {
            window.open('https://accounts.google.com', '_blank');
            alert("Por favor, ingresa tu correo y regresa.");
        }

        function generarNombreRandom() {
            const nombres = ["PilotoPro830", "ChickenMaster", "JostinFan"];
            document.getElementById('nombre-usuario').value = nombres[Math.floor(Math.random() * nombres.length)];
        }
    </script>
</body>
</html>
