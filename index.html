<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Strike NPC</title>
    <style>
        body { 
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background-size: cover; background-position: center;
        }
        body.bienvenida { background-image: url('Bienve.PNG'); }
        body.menu { background-image: url('Juego.PNG'); }

        .boton-estilo {
            background: transparent; /* Fondo invisible */
            border: none;
            color: transparent; /* Texto invisible */
            padding: 20px;
            width: 80%;
            cursor: pointer;
            margin: 10px;
        }
    </style>
</head>
<body class="bienvenida">
    <audio id="sonido-boton" src="Boton.mp3"></audio>

    <div id="pantalla-bienvenida" style="text-align: center; width: 100%;">
        <button class="boton-estilo" onclick="reproducirSonido(); irAlMenu()" style="height: 100px;"></button>
    </div>

    <div id="menu-principal" style="display:none; text-align: center; width: 100%;">
        <button class="boton-estilo" onclick="reproducirSonido(); alert('Iniciando...')"></button>
        <button class="boton-estilo" onclick="reproducirSonido(); location.reload()"></button>
    </div>

    <script>
        function reproducirSonido() { document.getElementById('sonido-boton').play(); }
        function irAlMenu() {
            document.body.className = 'menu';
            document.getElementById('pantalla-bienvenida').style.display = 'none';
            document.getElementById('menu-principal').style.display = 'block';
        }
    </script>
</body>
</html>
