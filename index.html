<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chicken Strike NPC - Beta</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Arial Black', sans-serif;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #stage {
            position: absolute;
            width: 600vw;
            height: 100vh;
            left: 0;
            background-image: url('Fondo.PNG');
            background-size: repeat-x;
            background-position: center;
            will-change: transform;
        }
        /* PANTALLA DE BIENVENIDA CON EL NOMBRE OFICIAL */
        #welcome-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: #fff;
            text-align: center;
            padding: 20px;
        }
        #welcome-screen h1 {
            color: #ffcc00;
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 3px 3px #000;
            letter-spacing: 1px;
        }
        #welcome-screen p {
            font-size: 18px;
            max-width: 80%;
            line-height: 1.4;
            margin-bottom: 30px;
            color: #ccc;
        }
        #start-button {
            background: #00ff00;
            color: #000;
            border: 4px solid #fff;
            padding: 15px 40px;
            font-size: 22px;
            font-family: 'Arial Black', sans-serif;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,255,0,0.4);
            transition: transform 0.1s ease;
            pointer-events: auto;
        }
        #start-button:active {
            transform: scale(0.95);
        }
        /* INTERFAZ (UI) */
        #ui-header {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }
        .ui-box {
            background: rgba(0, 0, 0, 0.65);
            padding: 8px 16px;
            border-radius: 20px;
            border: 3px solid #ffcc00;
            color: #fff;
            font-size: 18px;
            text-shadow: 2px 2px #000;
            display: flex;
            align-items: center;
        }
        #ui-score img {
            width: 30px;
            height: 30px;
            margin-right: 8px;
            animation: spin 4s linear infinite;
        }
        /* CARTEL DE RECOMPENSA */
        #announcement {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            color: #fff;
            font-size: 35px;
            text-align: center;
            text-shadow: 4px 4px #000;
            background: rgba(0, 0, 0, 0.85);
            padding: 20px 40px;
            border-radius: 15px;
            border: 5px solid #00ff00;
            z-index: 15;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .target {
            position: absolute;
            width: 110px;
            height: auto;
            transform: translate(-50%, -50%);
            z-index: 3;
            pointer-events: none;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 60px;
            background-image: url('Mira.PNG');
            background-size: contain;
            background-repeat: no-repeat;
            transform: translate(-50%, -50%);
            pointer-events: none !important;
            z-index: 8;
        }
        #weapon-container {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            height: auto;
            pointer-events: auto;
            cursor: pointer;
            z-index: 9;
            transition: transform 0.05s ease;
        }
        #weapon {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Pantalla de bienvenida con el Nombre Oficial -->
    <div id="welcome-screen">
        <h1>CHICKEN STRIKE NPC</h1>
        <p>Versión Beta Oficial en desarrollo para la plataforma MrTube.<br>Diseñado por ABG Productions® y Sprunki Animations Studios.</p>
        <button id="start-button">JUGAR BETA</button>
    </div>

    <div id="game-container">
        <div id="stage"></div>

        <div id="ui-header">
            <div class="ui-box" id="ui-score">
                <img src="Moneda.PNG" alt="Moneda">
                <span id="score-text">0</span>
            </div>
            <div class="ui-box" id="ui-level">
                Nivel: <span id="level-text">1</span>
            </div>
            <div class="ui-box" id="ui-kills">
                Objetivos: <span id="kills-text">0/10</span>
            </div>
        </div>

        <div id="announcement"></div>
        <div id="crosshair"></div>

        <div id="weapon-container">
            <img id="weapon" src="Manos.PNG" alt="Arma">
        </div>
    </div>

    <script>
        const stage = document.getElementById('stage');
        const scoreText = document.getElementById('score-text');
        const levelText = document.getElementById('level-text');
        const killsText = document.getElementById('kills-text');
        const announcement = document.getElementById('announcement');
        const weaponContainer = document.getElementById('weapon-container');
        const welcomeScreen = document.getElementById('welcome-screen');
        const startButton = document.getElementById('start-button');
        
        let score = 0;
        let kills = 0;
        let currentLevel = 1;
        let stageX = 0;
        let gameStarted = false;
        
        const scrollSpeed = 2.5; 
        const maxNPCs = 10;
        const distanceBetweenNPCs = 350; 

        startButton.addEventListener('click', () => {
            welcomeScreen.style.display = 'none';
            gameStarted = true;
            for(let i = 0; i < maxNPCs; i++) {
                spawnNPC(i);
            }
        });

        function updateCamera() {
            if (!gameStarted) {
                requestAnimationFrame(updateCamera);
                return;
            }
            
            stageX -= scrollSpeed;
            
            if (stageX <= -window.innerWidth * 4) {
                stageX = 0;
                const targets = document.querySelectorAll('.target');
                targets.forEach(npc => {
                    let currentLeft = parseFloat(npc.style.left);
                    npc.style.left = (currentLeft - window.innerWidth * 4) + 'px';
                });
            }
            
            stage.style.transform = `translateX(${stageX}px)`;
            requestAnimationFrame(updateCamera);
        }
        requestAnimationFrame(updateCamera);

        function fireWeapon() {
            if (!gameStarted) return;

            weaponContainer.style.transform = 'translateX(-50%) translateY(20px) scale(0.95)';
            setTimeout(() => {
                weaponContainer.style.transform = 'translateX(-50%) translateY(0) scale(1)';
            }, 100);

            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            const targets = document.querySelectorAll('.target');
            targets.forEach((npc) => {
                if (npc.dataset.dead === "true") return;

                const rect = npc.getBoundingClientRect();
                
                if (centerX >= rect.left && centerX <= rect.right &&
                    centerY >= rect.top && centerY <= rect.bottom) {
                    
                    eliminateNPC(npc);
                }
            });
        }

        weaponContainer.addEventListener('mousedown', (e) => { e.stopPropagation(); fireWeapon(); });
        weaponContainer.addEventListener('touchstart', (e) => { e.stopPropagation(); e.preventDefault(); fireWeapon(); });

        function spawnNPC(index) {
            const npc = document.createElement('img');
            npc.src = 'NPC.PNG';
            npc.className = 'target';

            const screenOffset = -stageX;
            const spawnX = screenOffset + window.innerWidth + 100 + (index * distanceBetweenNPCs);
            const spawnY = window.innerHeight / 2 + 30; 

            npc.style.left = spawnX + 'px';
            npc.style.top = spawnY + 'px';

            stage.appendChild(npc);

            npc.checkBounds = setInterval(() => {
                const rect = npc.getBoundingClientRect();
                if (rect.right < 0) {
                    clearInterval(npc.checkBounds);
                    npc.remove();
                    spawnNPC(maxNPCs - 1); 
                }
            }, 1000);
        }

        function eliminateNPC(npc) {
            npc.dataset.dead = "true";
            clearInterval(npc.checkBounds);

            npc.src = 'Disparado.PNG';
            
            score += 5;
            scoreText.textContent = score;

            if (currentLevel === 1) {
                kills++;
                killsText.textContent = `${kills}/10`;
                
                if (kills === 10) {
                    triggerLevelReward();
                }
            } else {
                kills++;
                killsText.textContent = `${kills}`;
            }

            setTimeout(() => {
                npc.remove();
                spawnNPC(maxNPCs - 1); 
            }, 300);
        }

        function triggerLevelReward() {
            currentLevel = 2;
            score += 50; 
            
            scoreText.textContent = score;
            levelText.textContent = currentLevel;
            killsText.textContent = `${kills}`; 
            
            announcement.innerHTML = "¡NIVEL 1 COMPLETADO!<br><span style='color: #ffcc00;'>🎁 RECOMPENSA: +50 MONEDAS</span>";
            announcement.style.transform = "translate(-50%, -50%) scale(1)";
            
            setTimeout(() => {
                announcement.style.transform = "translate(-50%, -50%) scale(0)";
            }, 3000);
        }

        document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
    </script>
</body>
</html>
