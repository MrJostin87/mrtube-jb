<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chicken Strike NPC - Beta</title>
    <style>
        /* CSS: El diseño para que se vea como en image_4.png */
        body {
            margin: 0;
            background: linear-gradient(to bottom, #1a5f7a, #5c8d8f);
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        #pantalla-bienvenida {
            max-width: 400px;
            padding: 20px;
        }

        h1 { color: #ffcc00; text-shadow: 2px 2px 5px black; }

        input, button {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
        }

        input {
            background: #000;
            border: 2px solid #f1c40f;
            color: #fff;
            text-align: center;
        }

        button {
            background-color: #2c3e50;
            border: 2px solid #f1c40f;
            color: white;
            cursor: pointer;
        }

        #btn-empezar {
            background-color: #00ff00;
            border: 3px solid white;
            color: black;
            font-size: 1.2em;
        }

        #btn-empezar:disabled {
            background-color: #555;
            border-color: #333;
        }
    </style>
</head>
<body>

    <!-- Pantalla de Bienvenida -->
    <div id="pantalla-bienvenida">
        <h1>CHICKEN STRIKE NPC</h1>
        <p>¡Bienvenido! Ten en cuenta que esta es una versión Beta Oficial en desarrollo para la plataforma MrTube, por lo que va a tener algunos errores. Diseñado por ABG Productions® y Sprunki Animations Studios.</p>
        
        <p>INGRESA TU NOMBRE DE PILOTO:</p>
        <input type="text" id="nombre-usuario" placeholder="Mr.Jostin">
        
        <label>
            <input type="checkbox" id="check-listo" style="display:inline; width: auto;"> Estoy listo
        </label>

        <button id="btn-empezar" disabled onclick="irAlMenu()">EMPEZAR AHORA</button>
    </div>

    <!-- Menú Principal -->
    <div id="menu-principal" style="display:none;">
        <h1>CHICKEN STRIKE NPC</h1>
        <button onclick="alert('Iniciando Juego...')">Jugar</button>
        <button onclick="location.reload()">Salir del Juego</button>
    </div>

    <script>
        /* Lógica para activar el botón */
        const checkbox = document.getElementById('check-listo');
        const botonEmpezar = document.getElementById('btn-empezar');

        checkbox.addEventListener('change', () => {
            botonEmpezar.disabled = !checkbox.checked;
        });

        function irAlMenu() {
            document.getElementById('pantalla-bienvenida').style.display = 'none';
            document.getElementById('menu-principal').style.display = 'block';
        }
    </script>
</body>
</html>
