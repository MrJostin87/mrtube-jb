<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MrTube - Chicken Gun Auto-Scroll Beta</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Arial Black', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        /* El escenario que se moverá solo automáticamente */
        #stage {
            position: absolute;
            width: 500vw; /* Escenario bien ancho para el viaje infinito */
            height: 100vh;
            left: 0;
            background-image: url('Fondo.PNG');
            background-size: repeat-x; /* Se repite para que nunca se acabe el fondo */
            background-position: center;
            will-change: transform;
        }
        /* Marcador de Monedas */
        #ui-score {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 16px;
            border-radius: 30px;
            border: 3px solid #ffcc00;
            z-index: 10;
        }
        #ui-score img {
            width: 35px;
            height: 35px;
            margin-right: 10px;
            animation: spin 4s linear infinite;
        }
        #score-text {
            color: #fff;
            font-size: 24px;
            text-shadow: 2px 2px #000;
        }
        /* Objetivos (NPC) pegados al escenario móvil */
        .target {
            position: absolute;
            width: 110px;
            height: auto;
            transform: translate(-50%, -50%);
            z-index: 3;
            pointer-events: none;
        }
        /* Mira Fija en el Centro */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 60px;
            background-image: url('Mira.PNG');
            background-size: contain;
            background-repeat: no-repeat;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 8;
        }
        /* Botón de la Pistola (Manos) */
        #weapon-container {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            height: auto;
            pointer-events: auto;
            cursor: pointer;
            z-index: 9;
            transition: transform 0.05s ease;
        }
        #weapon {
            width: 100%;
            height: auto;
            display: block;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- El mundo que se mueve solo -->
        <div id="stage"></div>

        <!-- Interfaz quieta en la pantalla -->
        <div id="ui-score">
            <img src="Moneda.PNG" alt="Moneda">
            <span id="score-text">0</span>
        </div>

        <div id="crosshair"></div>

        <div id="weapon-container">
            <img id="weapon" src="Manos.PNG" alt="Arma">
        </div>
    </div>

    <script>
        const stage = document.getElementById('stage');
        const scoreText = document.getElementById('score-text');
        const weaponContainer = document.getElementById('weapon-container');
        
        let score = 0;
        let stageX = 0;
        
        // --- CONFIGURACIÓN DE VELOCIDAD ---
        // Sube este número si quieres que la cámara avance más rápido
        const scrollSpeed = 2; 

        // --- MOVIMIENTO AUTOMÁTICO DE LA CÁMARA ---
        function updateCamera() {
            stageX -= scrollSpeed;
            
            // Si el escenario se mueve demasiado, lo reiniciamos sutilmente para que sea infinito
            if (stageX <= -window.innerWidth * 3) {
                stageX = 0;
                // Reacomodar los NPCs activos para que no desaparezcan de golpe
                const targets = document.querySelectorAll('.target');
                targets.forEach(npc => {
                    let currentLeft = parseFloat(npc.style.left);
                    npc.style.left = (currentLeft - window.innerWidth * 3) + 'px';
                });
            }
            
            stage.style.transform = `translateX(${stageX}px)`;
            requestAnimationFrame(updateCamera);
        }
        
        // Arranca el movimiento solo
        requestAnimationFrame(updateCamera);


        // --- SISTEMA DE DISPARO MANUAL ---
        function fireWeapon() {
            // Retroceso visual de la pistola
            weaponContainer.style.transform = 'translateX(-50%) translateY(20px) scale(0.95)';
            setTimeout(() => {
                weaponContainer.style.transform = 'translateX(-50%) translateY(0) scale(1)';
            }, 100);

            // Centro de la pantalla
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            const targets = document.querySelectorAll('.target');
            targets.forEach((npc) => {
                if (npc.dataset.dead === "true") return;

                // Coordenadas del NPC en tiempo real
                const rect = npc.getBoundingClientRect();
                
                // Si el NPC cruza justo por el centro donde está la mira
                if (centerX >= rect.left && centerX <= rect.right &&
                    centerY >= rect.top && centerY <= rect.bottom) {
                    
                    eliminateNPC(npc);
                }
            });
        }

        // Eventos para disparar apachando las manos en PC o Celular
        weaponContainer.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            fireWeapon();
        });
        weaponContainer.addEventListener('touchstart', (e) => {
            e.stopPropagation();
            e.preventDefault();
            fireWeapon();
        });


        // --- LOGICA DE LOS ENEMIGOS (NPC) ---
        function spawnNPC() {
            const npc = document.createElement('img');
            npc.src = 'NPC.PNG';
            npc.className = 'target';

            // Aparecen un poco más adelante en el camino oculto de la derecha
            const screenOffset = -stageX;
            const spawnX = screenOffset + window.innerWidth + (Math.random() * window.innerWidth);
            const spawnY = Math.random() * (window.innerHeight - 300) + 150;

            npc.style.left = spawnX + 'px';
            npc.style.top = spawnY + 'px';

            stage.appendChild(npc);

            // Si el jugador lo deja pasar y se sale de la pantalla por la izquierda, se borra solo
            npc.checkBounds = setInterval(() => {
                const rect = npc.getBoundingClientRect();
                if (rect.right < 0) {
                    clearInterval(npc.checkBounds);
                    npc.remove();
                    spawnNPC();
                }
            }, 1000);
        }

        function eliminateNPC(npc) {
            npc.dataset.dead = "true";
            clearInterval(npc.checkBounds);

            // Cambiar a textura eliminado
            npc.src = 'Disparado.PNG';
            
            // Recompensa Trillonaria: de 5 en 5 monedas
            score += 5;
            scoreText.textContent = score;

            setTimeout(() => {
                npc.remove();
                spawnNPC();
            }, 500);
        }

        // Generar los primeros enemigos en cola
        for(let i = 0; i < 4; i++) {
            setTimeout(spawnNPC, i * 800);
        }
    </script>
</body>
</html>
