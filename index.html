<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chicken Strike NPC - Beta</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-size: cover;
            background-position: center;
            transition: background 0.5s ease;
        }

        /* Fondo inicial */
        body.bienvenida { background-image: url('Bienve.PNG'); }
        /* Fondo del menú */
        body.menu { background-image: url('Juego.PNG'); }

        #pantalla-bienvenida, #menu-principal {
            max-width: 400px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4); /* Capa oscura para leer mejor el texto */
            border-radius: 15px;
        }

        h1 { color: #ffcc00; text-shadow: 2px 2px 5px black; }

        input, button {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            box-sizing: border-box;
        }

        input { background: #000; border: 2px solid #f1c40f; color: #fff; text-align: center; }
        button { background-color: #2c3e50; border: 2px solid #f1c40f; color: white; cursor: pointer; }
        
        #btn-empezar { background-color: #00ff00; border: 3px solid white; color: black; font-size: 1.2em; }
        #btn-empezar:disabled { background-color: #555; border-color: #333; cursor: not-allowed; }
    </style>
</head>
<body class="bienvenida">

    <audio id="sonido-boton" src="Boton.mp3"></audio>

    <div id="pantalla-bienvenida">
        <h1>CHICKEN STRIKE NPC</h1>
        <p>¡Bienvenido! Ten en cuenta que esta es una versión Beta Oficial en desarrollo para la plataforma MrTube. Diseñado por ABG Productions® y Sprunki Animations Studios.</p>
        
        <input type="text" id="nombre-usuario" placeholder="Ingresa tu nombre">
        <button onclick="reproducirSonido(); iniciarConGoogle()">CEG (Correo Electrónico)</button>
        <button onclick="reproducirSonido(); generarNombreRandom()">Usar Nombre Random</button>
        
        <label>
            <input type="checkbox" id="check-listo" style="display:inline; width: auto;"> Estoy listo
        </label>

        <button id="btn-empezar" disabled onclick="reproducirSonido(); irAlMenu()">EMPEZAR AHORA</button>
    </div>

    <div id="menu-principal" style="display:none;">
        <h1>CHICKEN STRIKE NPC</h1>
        <button onclick="reproducirSonido(); alert('Iniciando Juego...')">Jugar</button>
        <button onclick="reproducirSonido(); location.reload()">Salir del Juego</button>
    </div>

    <script>
        const checkbox = document.getElementById('check-listo');
        const botonEmpezar = document.getElementById('btn-empezar');
        const sonidoBoton = document.getElementById('sonido-boton');

        function reproducirSonido() {
            sonidoBoton.currentTime = 0;
            sonidoBoton.play().catch(e => console.log("Sonido bloqueado hasta interacción"));
        }

        checkbox.addEventListener('change', () => {
            botonEmpezar.disabled = !checkbox.checked;
        });

        function irAlMenu() {
            document.body.className = 'menu'; // Cambia el fondo a Juego.PNG
            document.getElementById('pantalla-bienvenida').style.display = 'none';
            document.getElementById('menu-principal').style.display = 'block';
        }

        function iniciarConGoogle() {
            window.open('https://accounts.google.com', '_blank');
        }

        function generarNombreRandom() {
            const nombres = ["PilotoPro830", "ChickenMaster", "JostinFan"];
            document.getElementById('nombre-usuario').value = nombres[Math.floor(Math.random() * nombres.length)];
        }
    </script>
</body>
</html>
